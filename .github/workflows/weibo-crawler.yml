name: Weibo Crawler Hourly

on:
  schedule:
    # 每小时运行一次（在每小时的第 0 分钟）
    - cron: '0 * * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weibo crawler
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        run: |
          python weibo.py

      - name: Upload weibo data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weibo-data-${{ github.run_id }}
          path: weibo/
          retention-days: 7
          if-no-files-found: ignore
