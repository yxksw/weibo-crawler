name: Weibo Crawler Hourly

on:
    schedule:
        # 每小时运行一次（在每小时的第 0 分钟）
        - cron: "0 * * * *"
    # 支持手动触发
    workflow_dispatch:

jobs:
    crawl:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run weibo crawler
              env:
                  WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
              run: |
                  python weibo.py

            - name: Copy CORS configuration files
              run: |
                  cp _headers weibo/ 2>/dev/null || :
                  cp _redirects weibo/ 2>/dev/null || :

            - name: Push to gh-pages branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./weibo
                  publish_branch: gh-pages
                  force_orphan: false
                  commit_message: "Update weibo data: ${{ github.run_id }}"
