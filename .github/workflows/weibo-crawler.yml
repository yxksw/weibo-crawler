name: Weibo Crawler Hourly

on:
    schedule:
        # 每小时运行一次（在每小时的第 0 分钟）
        - cron: "0 * * * *"
    # 支持手动触发
    workflow_dispatch:

jobs:
    crawl:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run weibo crawler
              id: crawler
              env:
                  WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
              run: |
                  python weibo.py
              continue-on-error: true

            - name: Check Cookie Validity
              if: steps.crawler.outcome == 'failure'
              id: check-cookie
              uses: actions/github-script@v7
              with:
                  script: |
                      const title = `🚨 Cookie 可能已过期 - 爬虫运行失败`;
                      const body = `## Cookie 失效警告

                      爬虫在最近一次运行时失败，可能是由于 Cookie 过期导致的。

                      ### 错误信息
                      工作流运行失败，请检查日志确认是否为 Cookie 问题。

                      ### 请按以下步骤更新 Cookie：

                      1. **登录微博**：[https://weibo.com](https://weibo.com)
                      2. **获取新 Cookie**：
                         - 按 F12 打开开发者工具
                         - 切换到 Network（网络）标签
                         - 刷新页面
                         - 点击任意请求，查看 Request Headers
                         - 找到 Cookie 字段，复制完整值
                      3. **更新 GitHub Secret**：
                         - 进入仓库 Settings → Secrets and variables → Actions
                         - 找到 WEIBO_COOKIE，点击 Update
                         - 粘贴新的 Cookie 值
                         - 点击 Save

                      ### 查看运行日志
                      [查看失败的工作流运行](${context.payload.repository.html_url}/actions/runs/${context.runId})

                      ---
                      *此 Issue 由自动化工作流创建* | *创建时间：${new Date().toISOString()}*`;

                      // 检查是否已存在相同标题的 open issue
                      const issues = await github.rest.issues.listForRepo({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: 'open',
                          labels: 'cookie-expired'
                      });

                      const exists = issues.data.some(issue => issue.title === title);

                      if (!exists) {
                          const issue = await github.rest.issues.create({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              title: title,
                              body: body,
                              labels: ['cookie-expired', 'automated', 'bug']
                          });
                          console.log('✅ 已创建 Cookie 过期警告 Issue');
                          return { created: 'true', issueNumber: issue.data.number, issueUrl: issue.data.html_url };
                      } else {
                          console.log('ℹ️ 已存在未关闭的警告 Issue，跳过创建');
                          return { created: 'false' };
                      }

            - name: Send Email Notification on Failure
              if: steps.crawler.outcome == 'failure' && steps.check-cookie.outputs.created == 'true'
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: ${{ secrets.SMTP_SERVER }}
                  server_port: ${{ secrets.SMTP_PORT }}
                  username: ${{ secrets.SMTP_USERNAME }}
                  password: ${{ secrets.SMTP_PASSWORD }}
                  subject: "🚨 微博爬虫 - Cookie 失效警告"
                  to: ${{ secrets.NOTIFICATION_EMAIL }}
                  from: "Weibo Crawler <${{ secrets.SMTP_USERNAME }}>"
                  html_body: "<h2>🚨 Cookie 失效警告</h2><p>爬虫在最近一次运行时失败，可能是由于 <strong>Cookie 过期</strong>导致的。</p><h3>请按以下步骤更新 Cookie：</h3><ol><li><strong>登录微博</strong>：<a href='https://weibo.com'>https://weibo.com</a></li><li><strong>获取新 Cookie</strong>：<ul><li>按 F12 打开开发者工具</li><li>切换到 Network（网络）标签</li><li>刷新页面</li><li>点击任意请求，查看 Request Headers</li><li>找到 Cookie 字段，复制完整值</li></ul></li><li><strong>更新 GitHub Secret</strong>：<ul><li>进入仓库 Settings → Secrets and variables → Actions</li><li>找到 WEIBO_COOKIE，点击 Update</li><li>粘贴新的 Cookie 值</li><li>点击 Save</li></ul></li></ol><h3>相关链接：</h3><ul><li><a href='${{ steps.check-cookie.outputs.issueUrl }}'>查看警告 Issue</a></li><li><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.runId }}'>查看失败日志</a></li></ul><hr><p><small>此邮件由自动化工作流发送 | 仓库：${{ github.repository }}</small></p>"
                  convert_markdown: false

            - name: Fail if crawler failed
              if: steps.crawler.outcome == 'failure'
              run: |
                  echo "爬虫运行失败，请检查上面的日志和创建的 Issue"
                  exit 1

            - name: Copy CORS configuration files
              run: |
                  cp _headers weibo/ 2>/dev/null || :
                  cp _redirects weibo/ 2>/dev/null || :

            - name: Push to gh-pages branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./weibo
                  publish_branch: gh-pages
                  force_orphan: false
                  commit_message: "Update weibo data: ${{ github.run_id }}"
